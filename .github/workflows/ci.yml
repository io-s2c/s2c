name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') != true
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # https://github.com/actions/setup-java/releases/tag/v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # https://github.com/gradle/actions/releases/tag/v6.1.0

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Run tests (in-memory S3)
        run: ./gradlew test -Ps3backend=inmemory --no-daemon --info
        env:
          GRADLE_OPTS: "-Xmx1g"

#      - name: Run tests (LocalStack)
#        run: ./gradlew test -Ps3backend=localstack --no-daemon --info
#        env:
#          GRADLE_OPTS: "-Xmx1g -Xlog:gc"

      - name: Upload test logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # https://github.com/actions/upload-artifact/releases/tag/v7.0.1
        if: always()
        with:
          name: test-results
          path: |
            logs/
          retention-days: 7

      - name: Upload test results
        uses: dorny/test-reporter@0a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # https://github.com/dorny/test-reporter/releases/tag/v3.0.0
        if: always()
        with:
          name: Gradle tests
          path: |
            **/build/test-results/**/*.xml
          reporter: java-junit
			  
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # https://github.com/actions/checkout/releases/tag/v6.0.2
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # https://github.com/actions/setup-java/releases/tag/v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # https://github.com/gradle/actions/releases/tag/v6.1.0
      - name: Assemble
        run: ./gradlew assemble -Pversion=${GITHUB_REF_NAME#v}
      - name: Publish to GitHub Packages
        run: ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # https://github.com/softprops/action-gh-release/releases/tag/v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          generate_release_notes: true
          files: |
            build/libs/*.jar